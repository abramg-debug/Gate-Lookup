<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Gate Lookup</title>
<style>
  :root{
    --bg:#0b1220;
    --card:#121a2b;
    --text:#e8eefc;
    --muted:#9fb0d8;
    --ok:#17c964;
    --err:#f31260;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
  }
  .wrap{
    max-width:860px;
    margin:32px auto;
    padding:16px;
  }
  .card{
    background:var(--card);
    border:1px solid rgba(255,255,255,.06);
    border-radius:16px;
    box-shadow:0 6px 20px rgba(0,0,0,.35);
    padding:18px;
  }
  h1{
    margin:0 0 12px;
    font-size:20px;
    font-weight:700;
    letter-spacing:.2px;
  }
  .row{
    display:flex;
    gap:10px;
    align-items:center;
  }
  input[type="text"]{
    flex:1;
    padding:14px 14px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,.1);
    background:#0f172a;
    color:var(--text);
    font-size:18px;
  }
  input::placeholder{color:#93a3c7}
  .hint{
    color:var(--muted);
    font-size:13px;
    margin-top:8px;
  }
  .result{
    margin-top:16px;
    padding:14px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,.08);
    background:#0e1628;
    min-height:64px;
  }
  .result.ok{outline:2px solid color-mix(in oklab, var(--ok) 55%, transparent)}
  .result.err{outline:2px solid color-mix(in oklab, var(--err) 55%, transparent)}
  .kvs{
    display:grid;
    grid-template-columns:120px 1fr;
    gap:8px 12px;
  }
  .k{color:var(--muted)}
  .v{font-weight:600}
  .pill{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:#0c1222;
    border:1px solid rgba(255,255,255,.08);
    color:var(--muted);
    padding:8px 10px;
    border-radius:999px;
    font-size:12px;
    margin-top:10px;
  }
  .site-block{
    margin-bottom:16px;
    padding-bottom:12px;
    border-bottom:1px solid rgba(255,255,255,.06);
  }
  .site-block:last-child{
    margin-bottom:0;
    padding-bottom:0;
    border-bottom:none;
  }
  .match-block{
    margin-bottom:12px;
    padding-bottom:12px;
    border-bottom:1px solid rgba(255,255,255,.06);
  }
  .match-block:last-child{
    margin-bottom:0;
    padding-bottom:0;
    border-bottom:none;
  }

  .gate-table{
    margin-top:8px;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
  }

  .gate-header,
  .gate-row{
    display:grid;
    grid-template-columns:70px minmax(110px, max-content) minmax(80px, max-content) auto;
    column-gap:14px;
    align-items:center;
    min-width:max-content;
  }

  .gate-header{
    font-weight:700;
    color:var(--muted);
    margin-bottom:6px;
    font-size:13px;
  }

  .gate-row{
    padding:6px 0;
    border-top:1px solid rgba(255,255,255,.12);
  }

  .gate-row:first-of-type{
    border-top:none;
  }

  .gate-header > div,
  .gate-row > div{
    white-space:nowrap;
  }

  .gate-row .qr-cell{
    justify-self:start;
  }

  .qr-yes{
    color:white;
    background:#f31260;
    padding:2px 6px;
    border-radius:4px;
    font-size:11px;
    font-weight:700;
    display:inline-block;
  }

  .footer{
    margin-top:16px;
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .tiny{
    font-size:12px;
    color:var(--muted);
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Gate Lookup</h1>
      <div class="row">
        <input id="gate" type="text" placeholder="Type a Gate # (e.g. 490) or Site Name (e.g. Pomona)" autocomplete="off" />
      </div>
      <div class="hint">Numeric input searches Gate #. Exact match shows one gate; partial gate input shows matching gates. Text searches Site Name.</div>
      <div id="out" class="result" aria-live="polite"></div>
      <div class="footer">
        <span class="tiny">• Works offline • Single-file app</span>
      </div>
    </div>
  </div>

    gate, { line, siteId, siteName, gate, array, type, qr }
  ])
);

const bySite = new Map();

  const key = siteName.toLowerCase();
  if (!bySite.has(key)) {
    bySite.set(key, { line, siteId, siteName, gates: [] });
  }
  bySite.get(key).gates.push({ gate, array, type, qr });
}

  clearTimeout(timer);
  timer = setTimeout(runLookup, 120);
});

function digitsOnly(v){
  return String(v || "").replace(/\D+/g, "");
}

function padGate(v){
  const s = digitsOnly(v);
  return s ? s.padStart(5, "0") : "";
}

function displayGate(g){
  return String(parseInt(g, 10));
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, ch => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;',
    "'":'&#39;'
  }[ch]));
}

function qrBadge(show){
  return show ? '<span class="qr-yes">QR</span>' : '';
}

function runLookup(){
  const val = input.value.trim();

  if (!val) {
    out.className = 'result';
    out.innerHTML = '';
    return;
  }

  if (/^\d+$/.test(val)) {
    lookupGate(val);
  } else {
    lookupSite(val);
  }
}

function lookupGate(gateInput){
  const rawDigits = digitsOnly(gateInput);
  if (!rawDigits) {
    out.className = 'result err';
    out.innerHTML = '<div class="v">Enter a gate number.</div>';
    return;
  }

  const norm = padGate(gateInput);
  const rec = byGate.get(norm);

  if (rec) {
    const color = lineColors[rec.line] || 'Unknown';
    out.className = 'result ok';
    out.innerHTML = `
      <div class="kvs">
        <div class="k">Gate #</div><div class="v">${displayGate(rec.gate)}</div>
        <div class="k">Line</div><div class="v">${escapeHtml(rec.line)} (${escapeHtml(color)})</div>
        <div class="k">Site ID</div><div class="v">${escapeHtml(rec.siteId)}</div>
        <div class="k">Site Name</div><div class="v">${escapeHtml(rec.siteName)}</div>
        <div class="k">Array</div><div class="v">${escapeHtml(rec.array)}</div>
        <div class="k">Type</div><div class="v">${escapeHtml(rec.type)}</div>
        ${rec.qr ? `<div class="k">QR</div><div class="v">${qrBadge(true)}</div>` : ''}
      </div>
      <span class="pill">Exact match</span>
    `;
    return;
  }

  const partialMatches = [...byGate.values()]
    .filter(r => r.gate.includes(rawDigits))
    .sort((a, b) => a.gate.localeCompare(b.gate));

  if (partialMatches.length === 0) {
    out.className = 'result err';
    out.innerHTML = `
      <div class="kvs">
        <div class="k">Gate #</div><div class="v">${escapeHtml(norm)}</div>
        <div class="k">Status</div><div class="v">Not found</div>
      </div>
      <span class="pill" style="color:var(--err)">No match</span>
    `;
    return;
  }

  const html = partialMatches.map(r => {
    const color = lineColors[r.line] || 'Unknown';
    return `
      <div class="match-block">
        <div><b>${displayGate(r.gate)}</b> — ${escapeHtml(r.siteName)} (Line ${escapeHtml(r.line)} – ${escapeHtml(color)} – Site ID ${escapeHtml(r.siteId)})</div>
        <div class="gate-table">
          <div class="gate-header">
            <div>Gate#</div>
            <div>Array</div>
            <div>Type</div>
            <div></div>
          </div>
          <div class="gate-row">
            <div>${displayGate(r.gate)}</div>
            <div>${escapeHtml(r.array)}</div>
            <div>${escapeHtml(r.type)}</div>
            <div class="qr-cell">${r.qr ? qrBadge(true) : ''}</div>
          </div>
        </div>
      </div>
    `;
  }).join('');

  out.className = 'result ok';
  out.innerHTML = html + `<span class="pill">${partialMatches.length} matching gate${partialMatches.length > 1 ? 's' : ''}</span>`;
}

function lookupSite(term){
  const q = term.toLowerCase();

  const matches = [...bySite.values()]
    .filter(s => s.siteName.toLowerCase().includes(q))
    .sort((a, b) => a.siteName.localeCompare(b.siteName));

  if (matches.length === 0) {
    out.className = 'result err';
    out.innerHTML = `<div class="v">No sites found matching “${escapeHtml(term)}”.</div>`;
    return;
  }

  const html = matches.map(s => {
    const color = lineColors[s.line] || 'Unknown';
    const gateRows = s.gates
      .slice()
      .sort((a, b) => a.gate.localeCompare(b.gate))
      .map(g => `
        <div class="gate-row">
          <div>${displayGate(g.gate)}</div>
          <div>${escapeHtml(g.array)}</div>
          <div>${escapeHtml(g.type)}</div>
          <div class="qr-cell">${g.qr ? qrBadge(true) : ''}</div>
        </div>
      `)
      .join('');

    return `
      <div class="site-block">
        <div><b>${escapeHtml(s.siteName)}</b> (Line ${escapeHtml(s.line)} – ${escapeHtml(color)} – Site ID ${escapeHtml(s.siteId)})</div>
        <div class="gate-table">
          <div class="gate-header">
            <div>Gate#</div>
            <div>Array</div>
            <div>Type</div>
            <div></div>
          </div>
          ${gateRows}
        </div>
      </div>
    `;
  }).join('');

  out.className = 'result ok';
  out.innerHTML = html + `<span class="pill">${matches.length} site${matches.length > 1 ? 's' : ''} found</span>`;
}
</script>

</html>
